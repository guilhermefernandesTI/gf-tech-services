<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GF Tech Services</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Servicos de tecnologia</p>
        <h1>GF Tech Services</h1>
      </div>
      <span id="service-count" class="counter">0 servicos</span>
    </header>

    <main class="layout">
      <section class="panel form-panel" aria-labelledby="form-title">
        <h2 id="form-title">Registrar atendimento</h2>
        <form id="service-form">
          <input type="hidden" id="service-id">

          <label>
            Cliente
            <input id="customer-name" name="customerName" autocomplete="name" required minlength="3">
          </label>

          <label>
            Telefone
            <input id="customer-phone" name="customerPhone" autocomplete="tel" required minlength="8">
          </label>

          <label>
            Equipamento
            <input id="equipment" name="equipment" required minlength="2">
          </label>

          <label>
            Descricao do servico
            <textarea id="description" name="description" required minlength="5"></textarea>
          </label>

          <div class="form-row">
            <label>
              Status
              <select id="status" name="status">
                <option>Aberto</option>
                <option>Em andamento</option>
                <option>Concluido</option>
                <option>Cancelado</option>
              </select>
            </label>

            <label>
              Valor
              <input id="price" name="price" type="number" min="0" step="0.01" value="0">
            </label>
          </div>

          <p id="form-message" class="message" role="status"></p>

          <div class="actions">
            <button type="submit">Salvar</button>
            <button type="button" id="cancel-edit" class="secondary">Cancelar</button>
          </div>
        </form>
      </section>

      <section class="panel list-panel" aria-labelledby="list-title">
        <div class="list-header">
          <h2 id="list-title">Atendimentos</h2>
          <input id="search" type="search" placeholder="Buscar cliente ou equipamento">
        </div>

        <div id="services-list" class="services-list"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
